<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<header>
<body style="background-color:pink">
    <h1 style="color:white;font-size: 100px;">The sweetest of treats:</h1>  
    </body>
</header>
    <!--Dropdown button for options of sweet treats-->
    <label style="color:palevioletred;font-size: 30px;"for="cakes">Cakes:</label><br>
    <!--Options of Cake Flavours-->
    <select id="cakes" name="cakes">
        <option value="Choc">Chocolate Cake R35</option>
        <option value="Vanil">Vanilla Cake R35</option>
        <option value="Red Velv">Red Velvet Cake R35</option>
        <option value="Carro">Carrot Cake R35</option>
        <option value="Caram">Caramel Cake R35</option>
        <option value="Tiramisu">Tiramisu Cake R45</option>
    </select><br><br>
    <label style="color:palevioletred;font-size:30px;"for="cupcakes">Cupcakes:</label><br>
    <!--Options for cupcake flavours-->
    <select id="Cupcakes" name="Cupcakes">  
        <option value="Choc">Chocolate Cupcake R15</option>
        <option value="Vanil">Vanilla Cupcake R15</option>
        <option value="Red Velv">Red Velvet Cupcake R15</option>
        <option value="Lemon S">Lemon Spritz Cupcake R15</option>
        <option value="C and C">Cookies'n Cream Cupcake R15</option>
        <option value="Black Velv">Black Velvet Cupcake R15</option>
    </select><br><br>
    <!--Options for Bread-->
    <label style="color:palevioletred;font-size:30px;"for="breads">Breads:</label><br>
     <select id="Breads" name="Breads">
        <option value="Crois">Croissant R15</option>
        <option value="Sour">Sourdough R30</option>
        <option value="Pretz">Pretzel R15</option>
        <option value="Bag">Bagel R20</option>
        <option value="French">French Bread R35</option>
        <option value="Wheat">Wheat Bread R35</option>
    </select><br><br>
    <!--Options for Sweet Treats-->
    <label style="color:palevioletred;font-size:30px;"for="Sweet Treats">Sweet Treats:</label><br>
    <select id="Sweet Treats" name="Sweet Treats">
        <option value="Cook">Cookies R10 each</option>
        <option value="Macar">Macaroons R5 each</option>
        <option value="Brown">Brownies R8 each</option>
        <option value="dough">Doughnuts R15 each</option>
        <option value="cinna">Cinnamon roll R40 for pack of 6</option>
        <option value="Tart">Tarts R20 each</option> 
    </select><br><br>
</body>
</html>
